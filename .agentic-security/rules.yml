# Files where the scanner self-detects: rule libraries trip on their own
# detection patterns / fix-message strings.
# Files where rule context doesn't apply: CLI scripts, Claude Code hooks, the
# VS Code extension, and scanner-internal modules. The "Synchronous Blocking
# I/O (DoS Risk in Server Context)" and ReDoS rules assume a long-running
# server; these are one-shot tools.
ignorePaths:
  # Scanner source — rule libraries contain detection pattern strings,
  # fix-message snippets, and example vulnerable code that the engine
  # misidentifies as real vulnerabilities.
  # NOTE: scanner/test/** is intentionally NOT excluded — test fixtures are
  # scanned by unit tests and must remain reachable.
  - scanner/src/**
  - scanner/dist/**
  - scanner/bin/**

  # Scan output artefacts — HTML report contains finding snippets
  - .agentic-security/**
  - reports/**

  # Claude Code hooks (one-shot, exit immediately)
  - hooks/post-edit-scan.js
  - hooks/session-welcome.js

  # CI / standalone scripts
  - scripts/pr-comment.js

  # Code-generator scripts — emit TypeScript snippets as Python strings;
  # the scanner sees fs.readFileSync/writeFileSync inside the string literals
  # and flags them as sync-I/O DoS risk, but the snippets are templates for
  # user code, not running server code.
  - scripts/llm-cost-ceiling.py

  # VS Code extension (editor activation, not a server)
  - vscode/src/extension.ts

  # GitHub Actions inline scripts (one-shot CI runs, not server context)
  - .github/workflows/scan.yml
  - .github/workflows/example-consumer.yml
  - .github/workflows/bench.yml

  # Bodyguard rule library — its `hint:` strings describe SAFE patterns
  # (e.g., "Use jwt.verify(token, secret)") which the AuthZ rule misreads as code.
  - hooks/pre-edit-bodyguard.js
  - hooks/pre-bash-guard.js
